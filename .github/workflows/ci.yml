name: Verificação PAF

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  application:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run audit

  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Iniciar banco local e aplicar migrations
        run: supabase start
      - name: Reaplicar schema do zero
        run: supabase db reset
      - name: Testar transações do banco
        run: supabase test db
      - name: Encerrar serviços locais
        if: always()
        run: supabase stop --no-backup
